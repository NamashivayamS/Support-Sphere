apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  labels:
    app: support-sphere
    tier: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: support-sphere
      tier: frontend
  template:
    metadata:
      labels:
        app: support-sphere
        tier: frontend
    spec:
      containers:
      - name: frontend
        image: <your-dockerhub-username>/support-frontend:v1
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  labels:
    app: support-sphere
    tier: frontend
spec:
  type: NodePort
  selector:
    app: support-sphere
    tier: frontend
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080
    protocol: TCP
    name: http
